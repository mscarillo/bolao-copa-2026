name: Atualizar Resultados Copa 2026

on:
  schedule:
    # A cada 10 minutos das 12h às 23h UTC (09h–20h Brasília)
    - cron: '*/10 12-23 * * *'
    # 1x/hora fora desse horário
    - cron: '0 0-11 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # usa Node.js 24, sem warnings

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar e salvar resultados
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/buscar_resultados.py
