name: Atualizar Resultados Copa 2026

on:
  schedule:
    # A cada 10 minutos das 12h às 23h UTC (09h-20h Brasília) durante a Copa
    - cron: '*/10 12-23 * * *'
    # Também roda 1x/hora fora desse horário (captura resultados noturnos)
    - cron: '0 0-11 * * *'
  # Permite rodar manualmente pelo GitHub
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar e salvar resultados
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/buscar_resultados.py
